name: astrbot_plugin_mind_control
display_name: 脑控大师
short_desc: 多模式沉浸式互动插件，支持渐进强度、余韵、随机变体、远程启动
desc: 给 Bot 安装可遥控的小装置，触发后 Bot 进入沉浸式互动状态。支持多种预设模式（控制/宠物/师徒/害羞/傲娇）、渐进强度曲线、余韵阶段、随机反应变体、/mc_st 指令远程启动。
author: ELAUK
version: v2.1.5
repo: https://github.com/hckerelauk-git/astrbot_plugin_mind_control
help: |
  ## 脑控大师 v2.1.3

  ### 指令
  - `/mc_help` — 查看帮助
  - `/mc_status` — 查看当前状态
  - `/mc_st` — 远程启动（等待用户消息触发 LLM）
  - `/mc_list` — 查看所有会话（管理员）
  - `/mc_clear` — 清除所有会话（管理员）
  - `/mc_mode` — 切换预设模式（管理员）

  ### 自定义预设（v2.1.2+）
  你可以在 WebUI 的插件配置中添加自己的预设模式。
  详细说明请查看插件目录下的 `pages/index.html` 文件。
  - `/mc_clear` — 清除所有会话（管理员）
  - `/mc_mode` — 切换预设模式（管理员）

  ### 触发词
  - 进入：控制 / 我要控制你了
  - 退出：拿出来吧 / 停止
  - 延长：继续 / 再来

  ### 预设模式
  - **control**（控制）：经典控制模式
  - **pet**（宠物化）：Bot 变成小动物
  - **teacher**（师徒）：严厉老师模式
  - **shy**（害羞）：极度害羞模式
  - **tsundere**（傲娇）：傲娇模式
