name: astrbot_plugin_mind_control
display_name: 脑控大师
short_desc: 多模式沉浸式互动插件，支持渐进强度、余韵、随机变体、远程控制、自定义提示词
desc: 给 Bot 安装可遥控的小装置，触发后 Bot 进入沉浸式互动状态。支持多种预设模式（控制/宠物/师徒/害羞/傲娇）、渐进强度曲线、余韵阶段、随机反应变体、/tp_st指令远程启动、自定义提示词和自定义预设。
author: ELAUK
version: v2.3.7
repo: https://github.com/hckerelauk-git/astrbot_plugin_mind_control
help: |
  ## 脑控大师 v2.3.7

  ### 指令
  - `/mc_help` — 查看帮助
  - `/mc_status` — 查看当前状态
  - `/tp_st` — 远程启动（可指定敏感度，如 `/tp_st 50`）
  - `/控制` 或 `/控制 50` — 进入沉浸模式（使用当前模式，可指定敏感度）
  - `/mc_list` — 查看所有会话（管理员）
  - `/mc_clear` — 清除所有会话（管理员）
  - `/mc_mode [模式名]` — 切换模式（支持中文，如 `/mc_mode 害羞`）

  ### 触发词
  - 进入：控制 / 我要控制你了
  - 退出：拿出来吧 / 停止
  - 延长：继续 / 再来

  ### 内置预设模式
  - **control**（控制）：经典控制模式
  - **pet**（宠物化）：Bot 变成小动物
  - **teacher**（师徒）：严厉老师模式
  - **shy**（害羞）：极度害羞模式
  - **tsundere**（傲娇）：傲娇模式

  ### 自定义功能
  - **自定义提示词**：在插件配置中设置"自定义进入/余韵/退出提示词"
  - **自定义预设**：在插件配置中添加自定义预设列表，创建后用 `/mc_mode 预设名` 切换
  - **进入/退出消息**：可配置进入和退出时是否直接发送文字（不经过LLM）
