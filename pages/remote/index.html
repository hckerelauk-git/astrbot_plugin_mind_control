<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>脑控大师 - 远程管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 16px; margin-bottom: 12px; color: #333; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .session-list { list-style: none; }
    .session-list li { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-waiting { background: #fff3cd; color: #856404; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-afterglow { background: #d1ecf1; color: #0c5460; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .empty { text-align: center; color: #999; padding: 16px; font-size: 13px; }
    .status-row { display: flex; justify-content: space-between; align-items: center; }
    .status-info { display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎯 脑控大师 v2.0.0</h2>
    <div class="actions">
      <button class="btn btn-primary" onclick="refreshStatus()">🔄 刷新</button>
    </div>
  </div>

  <div class="card">
    <h2>📊 会话列表</h2>
    <div id="session-list"><div class="empty">加载中...</div></div>
  </div>

  <div class="card">
    <h2>🚀 远程启动</h2>
    <div id="platforms"></div>
    <div class="form-group">
      <label>自定义消息（留空用默认）</label>
      <input type="text" id="custom-msg" placeholder="嗯...？怎么了？">
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="startRemote()">启动控制</button>
    </div>
  </div>

  <script>
    const bridge = window.AstrBotPluginPage;

    async function init() {
      await bridge.ready();
      await refreshStatus();
    }

    async function refreshStatus() {
      try {
        const result = await bridge.apiGet("status");
        renderSessions(result || []);
        renderPlatforms(result || []);
      } catch (e) {
        document.getElementById("session-list").innerHTML = '<div class="empty">加载失败</div>';
      }
    }

    function renderSessions(sessions) {
      const el = document.getElementById("session-list");
      if (!sessions.length) {
        el.innerHTML = '<div class="empty">当前没有会话</div>';
        return;
      }
      const stateNames = { waiting: "⏳等待", active: "🔥激活", afterglow: "💫余韵" };
      const badgeClass = { waiting: "badge-waiting", active: "badge-active", afterglow: "badge-afterglow" };
      let html = '<ul class="session-list">';
      sessions.forEach(s => {
        html += `<li>
          <div class="status-info">
            <span class="badge ${badgeClass[s.state] || ''}">${stateNames[s.state] || s.state}</span>
            <span>${s.user_id}</span>
          </div>
          <div>
            <span>${s.remaining}秒</span>
            <button class="btn btn-danger btn-sm" onclick="stopSession('${s.key}')">停止</button>
          </div>
        </li>`;
      });
      html += '</ul>';
      el.innerHTML = html;
    }

    function renderPlatforms(sessions) {
      const el = document.getElementById("platforms");
      const activeUmos = new Set(sessions.filter(s => s.state === "active" || s.state === "waiting").map(s => s.umo));
      let html = '<div style="font-size:12px;color:#666;margin-bottom:8px">可用平台（勾选要启动的）：</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">';
      const platforms = ["QQ群", "Telegram", "Discord", "企微", "飞书", "钉钉", "Slack", "私聊"];
      platforms.forEach(p => {
        const id = "p_" + p;
        const disabled = activeUmos.has(p) ? "disabled" : "";
        const checked = activeUmos.has(p) ? "checked" : "";
        html += `<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:${activeUmos.has(p) ? '#d4edda' : '#f0f0f0'};border-radius:6px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="${id}" value="${p}" ${disabled} ${checked}> ${p}
        </label>`;
      });
      html += '</div>';
      el.innerHTML = html;
    }

    async function startRemote() {
      const checkboxes = document.querySelectorAll('#platforms input[type=checkbox]:checked');
      const platforms = Array.from(checkboxes).map(cb => cb.value);
      if (!platforms.length) { alert("请至少选择一个平台"); return; }
      const customMsg = document.getElementById("custom-msg").value;
      try {
        const result = await bridge.apiPost("start", { platforms, custom_msg: customMsg });
        alert("启动结果: " + JSON.stringify(result));
        await refreshStatus();
      } catch (e) {
        alert("启动失败: " + e.message);
      }
    }

    async function stopSession(key) {
      try {
        await bridge.apiPost("stop", { key });
        await refreshStatus();
      } catch (e) {
        alert("停止失败: " + e.message);
      }
    }

    init();
  </script>
</body>
</html>
