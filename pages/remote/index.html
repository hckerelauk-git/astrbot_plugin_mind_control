<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脑控大师 - 远程管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 18px; margin-bottom: 12px; color: #333; }
    .card h3 { font-size: 14px; margin-bottom: 8px; color: #666; }
    .status-list { list-style: none; }
    .status-list li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .status-list li:last-child { border-bottom: none; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-waiting { background: #fff3cd; color: #856404; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-afterglow { background: #d1ecf1; color: #0c5460; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .platform-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .platform-item { display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: #f0f0f0; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .platform-item.selected { background: #4a90d9; color: #fff; }
    .platform-item input { display: none; }
    .empty { text-align: center; color: #999; padding: 20px; font-size: 13px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎯 脑控大师 - 远程管理</h2>
    <div class="actions">
      <button class="btn btn-primary" onclick="refreshStatus()">🔄 刷新状态</button>
    </div>
  </div>

  <div class="card">
    <h2>📊 会话状态</h2>
    <div id="status-list">
      <div class="empty">加载中...</div>
    </div>
  </div>

  <div class="card">
    <h2>🚀 远程启动</h2>
    <h3>选择要激活的平台</h3>
    <div id="platforms" class="platform-list"></div>
    <div class="form-group">
      <label>自定义消息（留空使用默认）</label>
      <input type="text" id="custom-msg" placeholder="嗯...？怎么了？">
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="startRemote()">启动控制</button>
    </div>
  </div>

  <script>
    const bridge = window.AstrBotPluginPage;
    let context;

    async function init() {
      context = await bridge.ready();
      await refreshStatus();
    }

    async function refreshStatus() {
      const result = await bridge.apiGet("status");
      const list = document.getElementById("status-list");
      if (!result || result.length === 0) {
        list.innerHTML = '<div class="empty">当前没有会话</div>';
        return;
      }
      const stateNames = { waiting: "⏳等待", active: "🔥激活", afterglow: "💫余韵" };
      const stateBadge = { waiting: "badge-waiting", active: "badge-active", afterglow: "badge-afterglow" };
      let html = '<ul class="status-list">';
      result.forEach(s => {
        html += `<li>
          <span>${s.user_id} <span class="badge ${stateBadge[s.state] || ''}">${stateNames[s.state] || s.state}</span></span>
          <span>${s.remaining}秒 | 触发${s.trigger_count}次 <button class="btn btn-danger btn-sm" onclick="stopSession('${s.key}')">停止</button></span>
        </li>`;
      });
      html += '</ul>';
      list.innerHTML = html;
    }

    async function startRemote() {
      const checkboxes = document.querySelectorAll('#platforms input[type=checkbox]:checked');
      const platforms = Array.from(checkboxes).map(cb => cb.value);
      if (platforms.length === 0) {
        alert("请至少选择一个平台");
        return;
      }
      const customMsg = document.getElementById("custom-msg").value;
      const result = await bridge.apiPost("start", { platforms, custom_msg: customMsg });
      alert(JSON.stringify(result));
      await refreshStatus();
    }

    async function stopSession(key) {
      const result = await bridge.apiPost("stop", { key });
      alert(result.ok ? "已停止" : "停止失败");
      await refreshStatus();
    }

    init();
  </script>
</body>
</html>
