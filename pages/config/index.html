<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>脑控大师 - 配置页面</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --card-bg: #ffffff;
            --border: #ddd;
            --primary: #6366f1;
            --accent: #4f46e5;
        }
        [data-theme="dark"] {
            --bg: #111827;
            --text: #f3f4f6;
            --card-bg: #1f2937;
            --border: #374151;
            --primary: #818cf8;
            --accent: #6366f1;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: var(--bg);
            color: var(--text);
        }
        h1 { font-size: 1.8rem; margin-bottom: 5px; color: var(--primary); }
        .subtitle { color: #6b7280; margin-bottom: 30px; font-size: 0.9rem; }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .preset-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .preset-item:hover { transform: translateY(-2px); }
        .preset-name { font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .prompt-text {
            font-size: 0.85rem;
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-family: 'Fira Code', monospace;
            border: 1px solid var(--border);
        }
        [data-theme="dark"] .prompt-text { background: rgba(255,255,255,0.05); }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent); }
        button.secondary { background: #ef4444; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text);
            box-sizing: border-box;
        }
        .status { padding: 12px; border-radius: 6px; margin-top: 15px; display: none; text-align: center; font-weight: 600; }
        .status.success { background: #dcfce7; color: #166534; }
        .status.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <h1>脑控大师 - 配置</h1>
    <p class="subtitle">当前版本：v2.1.5 | 支持自定义预设和提示词预览</p>

    <!-- 当前模式 -->
    <div class="card">
        <div class="section-title">当前模式</div>
        <div id="current-mode" style="font-size:1.2em; font-weight:600; margin-bottom:15px;"></div>

        <div id="current-prompts">
            <div class="preset-item">
                <div class="preset-name">进入提示词 (enter)</div>
                <div class="prompt-text" id="prompt-enter"></div>
            </div>
            <div class="preset-item">
                <div class="preset-name">余韵提示词 (afterglow)</div>
                <div class="prompt-text" id="prompt-afterglow"></div>
            </div>
            <div class="preset-item">
                <div class="preset-name">退出提示词 (exit)</div>
                <div class="prompt-text" id="prompt-exit"></div>
            </div>
        </div>
    </div>

    <!-- 自定义预设管理 -->
    <div class="card">
        <div class="section-title">自定义预设</div>

        <div id="custom-presets-list">
            <div class="empty-hint">暂无自定义预设</div>
        </div>

        <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
            <div class="section-title">添加新预设</div>

            <div class="form-group">
                <label>预设名称</label>
                <input type="text" id="new-name" placeholder="例如：maid">
            </div>

            <div class="form-group">
                <label>进入提示词</label>
                <textarea id="new-enter" placeholder="你现在是... {item_name} ... {sensitivity}"></textarea>
            </div>

            <div class="form-group">
                <label>余韵提示词</label>
                <textarea id="new-afterglow" placeholder="你还在...状态中"></textarea>
            </div>

            <div class="form-group">
                <label>退出提示词</label>
                <textarea id="new-exit" placeholder="你恢复正常了"></textarea>
            </div>

            <button onclick="addPreset()">添加预设</button>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script type="module" src="./app.js"></script>
</body>
</html>
